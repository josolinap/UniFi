name: n8n Bot
on:
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [bot, status, agent]
        default: bot
        description: Run mode
        required: false
      hours:
        type: number
        default: 5
        description: Hours to run (bot mode)
        required: false
      cycles:
        type: number
        default: 3
        description: Agent cycles (agent mode)
        required: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          N8N_BASE_URL: ${{ secrets.N8N_BASE_URL }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python -m src.main ${{ github.event.inputs.mode || 'bot' }}