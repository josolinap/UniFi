name: Network Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [unifi_check]

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check environment
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          UNIFI_API_KEY: ${{ secrets.UNIFI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python -m src.main status --check-env

      - name: Get network data
        env:
          UNIFI_API_KEY: ${{ secrets.UNIFI_API_KEY }}
        run: python -c "import json; from src.unifi_client import UniFiClient; client = UniFiClient(); data = client.get_all_sites_data(); client.close(); print('Sites:', len(data.get('sites', [])[:1]))"
        continue-on-error: true

      - name: Check for offline devices
        run: |
          python -c "import json; data = {}; offline = []; print('No data')" >> $GITHUB_OUTPUT offline_devices.txt
        continue-on-error: true

      - name: Send Telegram alert
        uses: appleboy/telegram-action@v0.1.1
        if: false
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          message: "Network Monitor check completed"
        continue-on-error: true

      - name: Summary
        run: echo "Monitor check completed"