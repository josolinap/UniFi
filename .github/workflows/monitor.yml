name: Network Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [unifi_check]

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check environment
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          UNIFI_API_KEY: ${{ secrets.UNIFI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python -m src.main status --check-env

      - name: Run monitor check and get status
        id: status
        env:
          UNIFI_API_KEY: ${{ secrets.UNIFI_API_KEY }}
        run: |
          python -c "from src.unifi_client import get_network_summary; print(get_network_summary())" > status.txt
          cat status.txt
          echo "status_output=$(cat status.txt | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        uses: appleboy/telegram-action@v0.1.1
        if: success()
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          message: |
            Network Monitor Check

            ${{ steps.status.outputs.status_output || 'Check completed' }}

            Run ID: ${{ github.run_id }}
        continue-on-error: true

      - name: Summary
        run: echo "Monitor check completed"